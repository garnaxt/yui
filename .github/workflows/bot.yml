name: Run Discord Bot

permissions:
  contents: write
  
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Download bot files
        uses: actions/checkout@v3
        
      - name: Setup Git
        run: |
          git config --global user.name "mission-bot"
          git config --global user.email "bot@github.com"

      - name: Install Node
        uses: actions/setup-node@v3
        
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          MISSION_CHANNEL_ID: ${{ secrets.MISSION_CHANNEL_ID }}
        run: node index.js
